<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/xo-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Raw XO is a cinematic music game and culture room for people who remember songs by feeling, cover art, and context." />
    <meta name="theme-color" content="#1A1C2C" />
    <title>Raw XO | Music Guessing and Culture</title>

    <!-- Social link previews. og:image is root-relative so it resolves against
         whatever origin the app is deployed on — no hardcoded host. We skip an
         absolute og:url for the same reason. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Raw XO" />
    <meta property="og:title" content="Raw XO — Five seconds. Four options. One instinct." />
    <meta property="og:description" content="A cinematic 5-second music guessing game and culture room. Guess fast, climb the leaderboard, argue about what the lyrics mean." />
    <meta property="og:image" content="/og-cover.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Raw XO — Five seconds. Four options. One instinct." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Raw XO — Five seconds. Four options. One instinct." />
    <meta name="twitter:description" content="A cinematic 5-second music guessing game and culture room. Guess fast, climb the leaderboard, argue about what the lyrics mean." />
    <meta name="twitter:image" content="/og-cover.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load fonts without blocking render: fetch as a preload, then flip to a
         stylesheet on load. display=swap means text paints immediately in the
         fallback face and swaps to Barlow/Inter once they arrive — so the font
         never sits on the LCP critical path. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,500;0,600;0,700;1,600;1,700&family=Inter:wght@400;500;600;700;800&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,500;0,600;0,700;1,600;1,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
