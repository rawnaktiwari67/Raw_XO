name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      # Mirrors the Vercel install command so CI catches what deploy would.
      - name: Install dependencies
        run: npm ci --include=dev

      - name: Test
        run: npm test

      # Typechecks (tsc --noEmit) then builds both workspaces.
      - name: Build
        run: npm run build:vercel
